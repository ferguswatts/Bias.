<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Install Bias — NZ Journalist Transparency</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; -webkit-font-smoothing: antialiased; }
    .banner { width: 100%; max-width: 700px; margin: 40px auto 0; }
    .banner img { width: 100%; height: auto; max-height: 220px; object-fit: contain; display: block; }
    .container { max-width: 520px; width: 100%; padding: 0 20px; margin: 0 auto; text-align: center; }
    .tagline { font-size: 16px; color: #999; margin: 20px 0 40px; line-height: 1.5; }
    
    /* Primary CTA */
    .primary-btn { display: inline-flex; align-items: center; gap: 10px; padding: 16px 36px; border-radius: 8px; font-size: 18px; font-weight: 600; text-decoration: none; color: #fff; transition: transform 0.15s, box-shadow 0.15s; }
    .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
    .primary-btn.chrome { background: #4285f4; }
    .primary-btn.firefox { background: #ff7139; }
    .primary-btn.safari { background: #007aff; }
    .primary-btn.coming-soon { background: #444; cursor: default; }
    .primary-btn.coming-soon:hover { transform: none; box-shadow: none; }

    .detected { font-size: 13px; color: #666; margin-top: 12px; }

    /* Other platforms */
    .other-section { margin-top: 48px; padding-top: 32px; border-top: 1px solid #2a2a3e; }
    .other-title { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
    .other-links { display: flex; flex-direction: column; gap: 10px; }
    .other-link { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #232340; border-radius: 8px; text-decoration: none; color: #ccc; font-size: 14px; transition: background 0.15s; }
    .other-link:hover { background: #2a2a50; }
    .other-link .status { font-size: 12px; color: #666; }
    .other-link .status.live { color: #4ade80; }

    /* Footer */
    footer { margin-top: 60px; padding: 24px 0 40px; font-size: 12px; color: #555; text-align: center; }
    footer a { color: #777; text-decoration: none; }
    footer a:hover { color: #aaa; }
    footer .links { display: flex; gap: 20px; justify-content: center; margin-top: 8px; }

    @media (max-width: 480px) {
      .banner { margin-top: 20px; }
      .primary-btn { padding: 14px 28px; font-size: 16px; }
      .container { padding: 0 16px; }
    }
  </style>
</head>

<script>
(function() {
  // Store URLs — update these once approved
  var CHROME_URL = '#chrome-coming-soon';
  var FIREFOX_URL = '#firefox-coming-soon';

  var ua = navigator.userAgent;
  var platform = 'unknown';
  var label = '';
  var btnClass = '';
  var url = '';

  // Detect platform
  var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var isAndroid = /Android/.test(ua);
  var isFirefox = /Firefox\//.test(ua);
  var isSafari = /Safari\//.test(ua) && !/Chrome\//.test(ua);
  var isChrome = /Chrome\//.test(ua) && !/Edg\//.test(ua) && !/OPR\//.test(ua);
  var isEdge = /Edg\//.test(ua);

  if (isIOS) {
    platform = 'ios';
    label = 'Coming soon — iOS Safari';
    btnClass = 'coming-soon';
    url = '#';
  } else if (isAndroid && isFirefox) {
    platform = 'firefox-android';
    label = 'Add to Firefox';
    btnClass = 'firefox';
    url = FIREFOX_URL;
  } else if (isAndroid) {
    platform = 'android';
    label = 'Coming soon — Android';
    btnClass = 'coming-soon';
    url = '#';
  } else if (isFirefox) {
    platform = 'firefox';
    label = 'Add to Firefox';
    btnClass = 'firefox';
    url = FIREFOX_URL;
  } else if (isSafari) {
    platform = 'safari';
    label = 'Coming soon — Safari';
    btnClass = 'coming-soon';
    url = '#';
  } else if (isChrome || isEdge) {
    platform = 'chrome';
    label = 'Add to Chrome';
    btnClass = 'chrome';
    url = CHROME_URL;
  } else {
    platform = 'unknown';
    label = 'View all install options';
    btnClass = 'chrome';
    url = '#';
  }

  // Render primary button
  var cta = document.getElementById('primary-cta');
  if (btnClass === 'coming-soon') {
    cta.innerHTML = '<span class="primary-btn ' + btnClass + '">' + label + '</span>';
  } else if (url.startsWith('#')) {
    cta.innerHTML = '<span class="primary-btn ' + btnClass + '">' + label + ' (pending approval)</span>';
  } else {
    cta.innerHTML = '<a href="' + url + '" class="primary-btn ' + btnClass + '">' + label + '</a>';
  }

  // Show detected browser
  var info = document.getElementById('detected-info');
  var names = { chrome: 'Chrome', firefox: 'Firefox', safari: 'Safari', ios: 'iOS', android: 'Android', 'firefox-android': 'Firefox for Android' };
  if (names[platform]) {
    info.textContent = 'Detected: ' + names[platform];
  }

  // Set store links
  document.getElementById('link-chrome').href = CHROME_URL;
  document.getElementById('link-firefox').href = FIREFOX_URL;
})();
</script>
